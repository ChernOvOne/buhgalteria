events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/x-javascript;

    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:80;  }

    # HTTP — используется в dev-режиме или до настройки SSL
    server {
        listen 80;
        server_name _;

        # ACME challenge для certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # UTM redirect tracking
        location /go/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
        }

        # Загруженные файлы (чеки)
        location /uploads/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # Frontend SPA
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
