services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: buhdb
      POSTGRES_USER: buh
      POSTGRES_PASSWORD: ${DB_PASSWORD:-buhpass}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buh -d buhdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://buh:${DB_PASSWORD:-buhpass}@db:5432/buhdb
      DATABASE_URL_SYNC: postgresql://buh:${DB_PASSWORD:-buhpass}@db:5432/buhdb
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      REDIS_URL: redis://redis:6379/0
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_CHANNEL_ID: ${TG_CHANNEL_ID:-}
      TG_ADMIN_ID: ${TG_ADMIN_ID:-}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://buh:${DB_PASSWORD:-buhpass}@db:5432/buhdb
      DATABASE_URL_SYNC: postgresql://buh:${DB_PASSWORD:-buhpass}@db:5432/buhdb
      TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
      TG_CHANNEL_ID: ${TG_CHANNEL_ID:-}
      TG_ADMIN_ID: ${TG_ADMIN_ID:-}
    profiles:
      - bot

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  db_data:
  redis_data:
  uploads:
